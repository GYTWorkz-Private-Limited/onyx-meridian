# Local stack: Meridian API + MongoDB. For dev with persistence.
# (The API also runs standalone with no Mongo — it falls back to in-memory.)
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_DB_URL: mongodb://mongo:27017/meridian
      PORT: "8010"
    ports:
      - "8010:8010"

volumes:
  mongo_data:
