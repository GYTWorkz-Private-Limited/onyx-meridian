<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onyx Meridian — Enterprise AI Workforce</title>
<style>
  :root{
    /* primary blue + white */
    --blue-900:#0b2a6b; --blue-800:#13367f; --blue-700:#1d4ed8; --blue-600:#2563eb;
    --blue-500:#3b82f6; --blue-300:#93c5fd; --blue-100:#dbeafe; --blue-50:#eff6ff;
    --white:#ffffff;
    /* neutrals */
    --ink:#0f172a; --slate:#475569; --muted:#94a3b8; --line:#e2e8f0;
    --bg:#f1f5f9; --surface:#ffffff; --surface-2:#f8fafc;
    /* accents */
    --green:#16a34a; --green-bg:#dcfce7; --amber:#d97706; --amber-bg:#fef3c7;
    --red:#dc2626; --red-bg:#fee2e2; --purple:#7c3aed; --purple-bg:#ede9fe;
    --teal:#0d9488; --teal-bg:#ccfbf1; --cyan:#0891b2;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
    --shadow-lg:0 12px 40px rgba(15,23,42,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--blue-600);text-decoration:none}
  h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

  /* ---------- sidebar ---------- */
  .side{background:linear-gradient(185deg,var(--blue-900),var(--blue-800) 60%,#0a1f52);
    color:#dbe6ff;display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#fff,var(--blue-300));
    display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,0,0,.25);flex:none}
  .logo svg{width:22px;height:22px}
  .brand .name{font-weight:800;color:#fff;font-size:15px;letter-spacing:.2px}
  .brand .sub{font-size:11px;color:var(--blue-300)}
  .nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:#7f9cdb;
    margin:16px 10px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
    color:#c5d6ff;cursor:pointer;font-weight:500;margin-bottom:2px;transition:.15s;border:1px solid transparent}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-item.active{background:linear-gradient(90deg,var(--blue-600),var(--blue-500));color:#fff;
    box-shadow:0 6px 18px rgba(37,99,235,.5);border-color:rgba(255,255,255,.12)}
  .nav-item svg{width:18px;height:18px;flex:none;opacity:.95}
  .nav-item .badge{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border-radius:20px;
    padding:1px 8px;font-size:11px;font-weight:700}
  .side-foot{margin-top:auto;padding:14px 10px 4px;border-top:1px solid rgba(255,255,255,.1);font-size:11.5px;color:#8fa9e0}

  /* ---------- main ---------- */
  .main{overflow-y:auto;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:14px 30px;display:flex;align-items:center;gap:16px}
  .topbar h1{font-size:20px}
  .topbar .crumb{color:var(--muted);font-size:12.5px;font-weight:500}
  .topbar .spacer{flex:1}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:10px;padding:7px 12px;color:var(--muted);width:260px}
  .search input{border:0;background:none;outline:none;width:100%;font-size:13px;color:var(--ink)}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue-600),var(--purple));
    color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .content{padding:26px 30px 60px;max-width:1240px;width:100%}
  .view{display:none;animation:fade .3s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- primitives ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:20px}
  .grid{display:grid;gap:18px}
  .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)} .g23{grid-template-columns:1.6fr 1fr}
  @media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2,.g23{grid-template-columns:1fr}}
  .row{display:flex;align-items:center;gap:12px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .muted{color:var(--muted)} .slate{color:var(--slate)}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);font-weight:700;margin:30px 0 12px}
  .lead{color:var(--slate);max-width:760px;margin:4px 0 0}

  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--blue-300);background:var(--blue-50)}
  .btn.primary{background:linear-gradient(135deg,var(--blue-600),var(--blue-500));color:#fff;border-color:transparent;
    box-shadow:0 6px 16px rgba(37,99,235,.35)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--blue-600)}
  .btn.danger{color:var(--red);border-color:#f3c4c4}.btn.danger:hover{background:var(--red-bg)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn svg{width:16px;height:16px}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:30px;font-size:11.5px;font-weight:700;border:1px solid transparent}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .p-blue{background:var(--blue-50);color:var(--blue-700)} .p-blue .dot{background:var(--blue-600)}
  .p-green{background:var(--green-bg);color:#15803d}.p-green .dot{background:var(--green)}
  .p-amber{background:var(--amber-bg);color:#b45309}.p-amber .dot{background:var(--amber)}
  .p-red{background:var(--red-bg);color:#b91c1c}.p-red .dot{background:var(--red)}
  .p-purple{background:var(--purple-bg);color:#6d28d9}.p-purple .dot{background:var(--purple)}
  .p-teal{background:var(--teal-bg);color:#0f766e}.p-teal .dot{background:var(--teal)}
  .p-gray{background:#eef2f7;color:#64748b}.p-gray .dot{background:#94a3b8}

  .stat .k{font-size:12px;color:var(--slate);font-weight:600;display:flex;align-items:center;gap:8px}
  .stat .v{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
  .stat .v small{font-size:14px;color:var(--muted);font-weight:600}
  .trend{font-size:12px;font-weight:700} .trend.up{color:var(--green)} .trend.down{color:var(--red)}
  .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
  .ic svg{width:20px;height:20px}
  .ic.blue{background:var(--blue-50);color:var(--blue-600)} .ic.green{background:var(--green-bg);color:var(--green)}
  .ic.purple{background:var(--purple-bg);color:var(--purple)} .ic.amber{background:var(--amber-bg);color:var(--amber)}
  .ic.teal{background:var(--teal-bg);color:var(--teal)} .ic.red{background:var(--red-bg);color:var(--red)}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
    font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line)}
  td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  tbody tr{transition:.12s}tbody tr:hover{background:var(--blue-50)}
  .bar{height:7px;border-radius:6px;background:var(--line);overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue-600),var(--blue-400,#60a5fa))}
  .bar.green>span{background:linear-gradient(90deg,var(--green),#4ade80)}
  .bar.amber>span{background:linear-gradient(90deg,var(--amber),#fbbf24)}

  .chip{display:inline-block;padding:3px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);
    font-size:11.5px;font-weight:600;color:var(--slate);margin:2px}
  .chip.code{font-family:ui-monospace,Menlo,monospace;color:var(--blue-700);background:var(--blue-50);border-color:var(--blue-100)}
  .kbd{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--surface-2);border:1px solid var(--line);
    padding:1px 6px;border-radius:6px}

  /* clickable cards */
  .clickable{cursor:pointer;transition:.15s}.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--blue-300)}

  /* timeline / phases */
  .phase{display:flex;gap:14px;padding:14px 0;border-bottom:1px dashed var(--line);position:relative}
  .phase:last-child{border-bottom:0}
  .phase .num{width:30px;height:30px;border-radius:50%;background:var(--surface-2);border:2px solid var(--line);
    display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--muted);flex:none;z-index:2}
  .phase.done .num{background:var(--green);border-color:var(--green);color:#fff}
  .phase.run .num{background:var(--blue-600);border-color:var(--blue-600);color:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.5)}50%{box-shadow:0 0 0 7px rgba(37,99,235,0)}}
  .phase .pbody h4{font-size:14px} .phase .pbody p{margin:3px 0 0;color:var(--slate);font-size:13px}
  .phase .out{margin-top:8px;font-size:12px;color:var(--green);font-weight:600;display:none}
  .phase.done .out{display:block}

  /* kanban */
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(2,1fr)}}
  .col{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:120px}
  .col h4{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);display:flex;justify-content:space-between;margin-bottom:10px}
  .tk{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;box-shadow:0 1px 2px rgba(15,23,42,.05);cursor:pointer;transition:.12s}
  .tk:hover{border-color:var(--blue-300);transform:translateY(-1px)}
  .tk .tt{font-weight:600;font-size:12.5px}
  .tk .meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
  .ava-mini{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff}

  /* autonomy ladder */
  .ladder{display:flex;gap:8px}
  .rung{flex:1;text-align:center;padding:10px 6px;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);font-size:12px;font-weight:700;color:var(--muted)}
  .rung.on{background:linear-gradient(135deg,var(--blue-600),var(--blue-500));color:#fff;border-color:transparent;box-shadow:0 6px 14px rgba(37,99,235,.3)}
  .rung.passed{background:var(--blue-50);color:var(--blue-700);border-color:var(--blue-100)}
  .rung small{display:block;font-weight:500;opacity:.85;margin-top:2px}

  /* slider */
  input[type=range]{width:100%;accent-color:var(--blue-600)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(2px);z-index:100;display:none;place-items:center;padding:24px}
  .modal-bg.open{display:grid}
  .modal{background:#fff;border-radius:18px;max-width:560px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .2s ease}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:none;opacity:1}}
  .modal .mhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .mbody{padding:22px}
  .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1}

  .badge-soft{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--blue-50);color:var(--blue-700)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--slate)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
</style>
</head>

        </div>`).join('')}
    </div>`).join('')}
  </div>`;

/* ----------------------------------------------------------- fragments ----- */
function stat(k,v,c,ic,note){return `<div class="card pad stat">
  <div class="between"><div class="k">${k}</div><div class="ic ${c}">${icon(ic)}</div></div>
  <div class="v">${v}</div><div class="muted" style="font-size:12px;margin-top:2px">${note||''}</div></div>`}
function loopStep(n,t,d,c,ic){return `<div style="text-align:center;flex:1;min-width:120px">
  <div class="ic ${c}" style="width:46px;height:46px;margin:0 auto 8px">${icon(ic)}</div>
  <div style="font-weight:700">${t}</div><div class="muted" style="font-size:11.5px;margin-top:2px">${d}</div></div>`}
function arrow(){return `<div class="muted" style="font-size:22px">→</div>`}

function approvalCard(a){return `<div class="card pad" id="ap-${a.id}" style="margin-bottom:14px">
  <div class="between"><div class="row">${pill(a.type.replace('_',' '),'p-amber')}
    <span class="pill ${a.risk==='high'?'p-red':'p-blue'}"><span class="dot"></span>${a.risk} risk</span></div>
    <div class="row"><div class="ava-mini" style="background:${colorFor(a.emp)}">${a.emp[0]}</div><span class="muted" style="font-size:12px">${a.emp}</span></div></div>
  <h3 style="margin-top:10px">${a.title}</h3>
  <p class="muted" style="font-size:13px;margin-top:4px">${a.why}</p>
  <div class="row" style="margin-top:14px;gap:10px">
    <button class="btn primary" onclick="decide('${a.id}','approve')">${icon('check')} Approve & commit</button>
    <button class="btn danger" onclick="decide('${a.id}','reject')">Reject</button>
    <button class="btn ghost">View audit trail</button>
  </div></div>`}

function workflowSvg(){
  const nodes=[['Detect overdue','#0d9488',60],['Draft reminder','#2563eb',230],['Send email','#0d9488',400],
    ['GATE: escalate?','#d97706',570],['Open dispute','#2563eb',740]];
  let e='';for(let i=0;i<nodes.length-1;i++){const x1=nodes[i][2]+150,x2=nodes[i+1][2];
    e+=`<path d="M${x1} 70 C ${x1+30} 70, ${x2-30} 70, ${x2} 70" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arr)"/>`}
  const n=nodes.map((nd,i)=>`<g><rect x="${nd[2]}" y="44" width="150" height="52" rx="12" fill="#fff" stroke="${nd[1]}" stroke-width="2"/>
    <rect x="${nd[2]}" y="44" width="6" height="52" rx="3" fill="${nd[1]}"/>
    <text x="${nd[2]+78}" y="68" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0f172a">${nd[0].replace('GATE: ','')}</text>
    <text x="${nd[2]+78}" y="84" text-anchor="middle" font-size="10" fill="#94a3b8">${i===3?'human commits':'step '+(i+1)}</text></g>`).join('');
  return `<svg width="900" height="140" style="min-width:900px"><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#cbd5e1"/></marker></defs>${e}${n}</svg>`}

function graphSvg(){
  const N={Customer:[90,60],Invoice:[300,60],Payment:[300,200],Dispute:[510,130]};
  const E=[['Customer','Invoice','owns'],['Invoice','Payment','settled by'],['Invoice','Dispute','may raise'],['Customer','Dispute','files']];
  let edges=E.map(([a,b,l])=>{const[x1,y1]=N[a],[x2,y2]=N[b];const dashed=l==='files';
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${dashed?'#cbd5e1':'#0d9488'}" stroke-width="2" ${dashed?'stroke-dasharray="4 4"':''}/>
    <text x="${(x1+x2)/2}" y="${(y1+y2)/2-6}" font-size="10" fill="#94a3b8" text-anchor="middle">${l}</text>`}).join('');
  let nodes=Object.entries(N).map(([k,[x,y]])=>`<g><circle cx="${x}" cy="${y}" r="34" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="${x}" y="${y+4}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1d4ed8">${k}</text></g>`).join('');
  return `<svg width="620" height="260" style="min-width:600px">${edges}${nodes}</svg>`}

/* ----------------------------------------------------------- modals -------- */
function openModal(html){$('#modal').innerHTML=html;$('#modalBg').classList.add('open')}
function closeModal(){$('#modalBg').classList.remove('open')}
$('#modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});

function openEmp(id){const e=employees.find(x=>x.id===id);const rungs=['shadow','assist','supervised','autonomous'];
  const idx=rungs.indexOf(e.autonomy);
  openModal(`<div class="mhead"><div class="row"><div class="avatar" style="background:${colorFor(e.name)}">${initials(e.name)}</div>
    <div><h3>${e.name}</h3><div class="muted" style="font-size:12px">${e.role} · ${e.dept} · ${e.tier}</div></div></div><span class="x" onclick="closeModal()">×</span></div>
   <div class="mbody">
    <div class="row" style="gap:8px;margin-bottom:14px">${pill(e.status,statusPill(e.status))}${pill('WIP '+e.wip,'p-blue')}${pill('♥ '+e.hb,'p-green')}</div>
    <div class="section-title" style="margin:0 0 8px">Autonomy ladder</div>
    <div class="ladder">${rungs.map((r,i)=>`<div class="rung ${i<idx?'passed':i===idx?'on':''}">${r}<small>L${i}</small></div>`).join('')}</div>
    <div class="section-title">Responsibilities</div>${e.resp.map(r=>`<div class="row" style="gap:8px;font-size:13px;padding:3px 0">✓ ${r}</div>`).join('')}
    <div class="section-title">Bound workflows</div><div class="tag-list">${e.workflows.map(w=>`<span class="chip">${w}</span>`).join('')}</div>
    <div class="section-title">Connectors</div><div class="tag-list">${e.connectors.map(c=>`<span class="chip code">${c}</span>`).join('')}</div>
    <div class="grid g2" style="margin-top:16px">
      <div class="card pad"><div class="muted" style="font-size:12px">Schedule</div><div style="font-weight:700;margin-top:4px;font-size:13px">${e.sched}</div></div>
      <div class="card pad"><div class="muted" style="font-size:12px">Spend / Budget</div><div style="font-weight:700;margin-top:4px">$${e.spent} / $${e.budget}</div>
        <div class="bar" style="margin-top:8px"><span style="width:${Math.round(e.spent/e.budget*100)}%"></span></div></div>
    </div>
    <div class="row" style="margin-top:16px;gap:10px"><button class="btn primary">Promote autonomy</button><button class="btn">Reconfigure</button>
      <button class="btn danger" onclick="closeModal();confirmDecommission('${e.name.split(' — ')[0]}')">Decommission</button></div>
   </div>`)}

function openTask(id){const t=tasks.find(x=>x.id===id);
  openModal(`<div class="mhead"><h3 style="font-size:16px">${t.title}</h3><span class="x" onclick="closeModal()">×</span></div>
   <div class="mbody">
    <div class="row" style="gap:8px">${pill(t.pri,priPill(t.pri))}${pill(t.col,'p-blue')}${t.gate?pill('at gate','p-amber'):''}</div>
    <div class="section-title">Owner</div><div class="row"><div class="ava-mini" style="background:${colorFor(t.owner)}">${t.owner[0]}</div> ${t.owner}</div>
    <div class="section-title">Provenance</div>
    <div class="card pad" style="font-size:12.5px"><span class="muted">Source:</span> meeting · 2026-06-19 standup<br><i style="color:var(--slate)">“Chase anything past 30 days before month-end.”</i></div>
    ${t.gate?`<div class="card pad" style="margin-top:14px;border-color:#fcd9a8;background:#fffaf0">
      <b>Human gate</b><p class="muted" style="font-size:12.5px;margin-top:4px">AI proposed this step — irreversible push. Commit to proceed.</p>
      <div class="row" style="margin-top:10px;gap:8px"><button class="btn primary sm" onclick="closeModal();toast('Committed — proceeding')">Commit</button><button class="btn sm">Edit</button><button class="btn danger sm" onclick="closeModal();toast('Dismissed')">Dismiss</button></div></div>`:
      `<div class="row" style="margin-top:16px;gap:10px"><button class="btn primary">Advance</button><button class="btn">Reassign</button></div>`}
   </div>`)}

function openDept(id){const d=departments.find(x=>x.id===id);go('departments');
  openModal(`<div class="mhead"><div class="row"><div class="ic blue">${icon('building')}</div><div><h3>${d.name}</h3><div class="muted" style="font-size:12px">${d.units.join(' · ')}</div></div></div><span class="x" onclick="closeModal()">×</span></div>
   <div class="mbody">
    <div class="grid g3"><div class="card pad stat"><div class="k">Employees</div><div class="v" style="font-size:24px">${d.employees}</div></div>
      <div class="card pad stat"><div class="k">Workflows</div><div class="v" style="font-size:24px">${d.workflows}</div></div>
      <div class="card pad stat"><div class="k">Effectiveness</div><div class="v" style="font-size:24px">${d.eff}</div></div></div>
    <div class="section-title">Employees in this unit</div>
    ${employees.filter(e=>e.dept===d.name).map(e=>`<div class="between" style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div class="row"><div class="ava-mini" style="background:${colorFor(e.name)}">${initials(e.name)}</div><b>${e.name.split(' — ')[0]}</b><span class="muted" style="font-size:12px">${e.name.split(' — ')[1]}</span></div>
      ${pill(e.autonomy,'p-purple')}</div>`).join('')||'<p class="muted">None yet.</p>'}
    <div class="row" style="margin-top:16px;gap:10px"><button class="btn primary" onclick="closeModal();go('onboard')">Run discovery agent</button><button class="btn" onclick="closeModal();go('knowledge')">Open Knowledge Sphere</button></div>
   </div>`)}

function confirmDecommission(name){
  openModal(`<div class="mhead"><h3>Decommission ${name}?</h3><span class="x" onclick="closeModal()">×</span></div>
   <div class="mbody"><p class="slate">This is a <b>cascade</b>, not a delete:</p>
    <div style="margin:12px 0">${['Revoke the scoped credential','Reassign in-flight work to a peer','Retire every schedule this employee created','Archive the audit trail (immutable)'].map(x=>`<div class="row" style="gap:8px;padding:6px 0;font-size:13px">${icon('check')} ${x}</div>`).join('')}</div>
    <div class="card pad" style="background:var(--amber-bg);border-color:#fcd9a8;font-size:12.5px"><b>Requires approval</b> — this opens a decommission gate for the caretaker to commit.</div>
    <div class="row" style="margin-top:16px;gap:10px"><button class="btn danger" onclick="closeModal();toast('Decommission gate opened for caretaker approval')">Open decommission gate</button><button class="btn" onclick="closeModal()">Cancel</button></div>
   </div>`)}

/* ----------------------------------------------------------- interactions -- */
function decide(id,act){const el=$('#ap-'+id);el.style.transition='.3s';el.style.opacity='0';el.style.transform='translateX(20px)';
  setTimeout(()=>{el.remove();const left=document.querySelectorAll('#approvalList .card').length;
    if(!left){$('#emptyApprovals').style.display='block'}
    document.querySelectorAll('[data-view=approvals] .badge').forEach(b=>b.remove());},320);
  toast(act==='approve'?'Approved & committed — audit row written':'Rejected — proposer notified')}

function adjCost(slider,base){const f=slider.value/100;const v=(base*f).toFixed(0);
  const row=slider.closest('tr');row.querySelector('[data-spent]').textContent='$'+v;
  slider.parentElement.querySelector('[data-cost]').textContent='$'+v+'/mo'}

let discovering=false;
function runDiscovery(){if(discovering)return;discovering=true;$('#runBtn').textContent='Running…';$('#runBtn').disabled=true;
  let i=0;const step=()=>{if(i>0)$('#ph-'+(i-1)).classList.replace('run','done');
    if(i<phases.length){$('#ph-'+i).classList.add('run');i++;setTimeout(step,750);}
    else{$('#runBtn').innerHTML='✓ Spec ready';$('#specCard').style.display='block';$('#specCard').scrollIntoView({behavior:'smooth'});discovering=false;}};
  step();}

function toast(msg){let t=document.createElement('div');t.textContent=msg;
  t.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);z-index:200;animation:fade .25s';
  document.body.appendChild(t);setTimeout(()=>{t.style.transition='.3s';t.style.opacity='0'},2400);setTimeout(()=>t.remove(),2750)}

/* ----------------------------------------------------------- router -------- */
const titles={dashboard:['Overview','Enterprise AI workforce at a glance'],departments:['Departments','Business units, roles & units of work'],
  employees:['AI Employees','Roles, autonomy, schedules & taskboards'],taskboard:['Taskboard','Shared work queue across the workforce'],
  approvals:['Approval Gates','AI proposes — a human commits'],onboard:['Onboarding Agent','Discovery & process decomposition'],
  workflows:['Workflows','Units of work composed with human gates'],connectors:['Connectors','The integration spine'],
  knowledge:['Knowledge Sphere','Per-department domain graph & live knowledge'],cost:['Cost Control','Effort, cadence & spend governance']};
function go(v){document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
  $('#content').innerHTML=`<div class="view active">${views[v]()}</div>`;
  $('#pageTitle').textContent=titles[v][0];$('#crumb').textContent=titles[v][1];
  $('.main').scrollTop=0;}
document.querySelectorAll('.nav-item').forEach(n=>{n.insertAdjacentHTML('afterbegin',icon(n.dataset.icon));
  n.addEventListener('click',()=>go(n.dataset.view))});
$('#searchBox').insertAdjacentHTML('afterbegin',icon('search'));
go('dashboard');
</script>
